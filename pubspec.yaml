name: image_ffi
description: >-
  Fast native image resize, thumbnail and JPEG/PNG encode for Dart over FFI.
  Several times quicker than the pure-Dart image package; stb-backed, no
  prebuilt binary.
version: 0.4.1
repository: https://github.com/Yusufihsangorgel/image_ffi

topics:
  - image
  - resize
  - jpeg
  - thumbnail
  - ffi

screenshots:
  - description: >-
      Median milliseconds to decode, resize and encode a 2000x2000 image. The
      full thumbnail pipeline takes 27.3 ms against the pure-Dart image
      package's 141.7, with resize compared at matched cubic quality.
    path: doc/benchmark.png

environment:
  sdk: ^3.9.0

dependencies:
  ffi: ^2.1.0
  hooks: ^2.1.0
  code_assets: ^1.2.1
  native_toolchain_c: ^0.19.3

dev_dependencies:
  image: ^4.0.0
  test: ^1.25.0
  lints: ^6.0.0
