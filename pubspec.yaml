name: image_ffi
description: >-
  Native image decode, resize and encode for Dart via Sean Barrett's stb over
  FFI. Fast thumbnails and JPEG/PNG output, compiled from source by build hooks.
version: 0.2.0
repository: https://github.com/Yusufihsangorgel/image_ffi

topics:
  - image
  - resize
  - jpeg
  - thumbnail
  - ffi

environment:
  sdk: ^3.9.0

dependencies:
  ffi: ^2.1.0
  hooks: ^2.1.0
  code_assets: ^1.2.1
  native_toolchain_c: ^0.19.3

dev_dependencies:
  image: ^4.0.0
  test: ^1.25.0
  lints: ^6.0.0
