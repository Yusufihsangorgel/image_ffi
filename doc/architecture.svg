<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" font-family="Menlo, monospace">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#38BDF8"/></marker>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38BDF8" stop-opacity="0.35"/><stop offset="1" stop-color="#0E1A2E"/></linearGradient>
  </defs>
  <rect width="1100" height="420" fill="#0B1220"/>
  <text x="60" y="50" font-size="23" font-weight="bold" fill="#E2E8F0">Bytes in, pixels or a thumbnail out</text>
  <text x="60" y="76" font-size="14" fill="#94A3B8">stb decodes the image, resizes it with a real filter, and re-encodes, all in native code reached over FFI.</text>

  <!-- encoded bytes -->
  <text x="70" y="150" font-size="12.5" fill="#64748B">PNG / JPEG bytes</text>
  <rect x="70" y="160" width="130" height="150" rx="8" fill="#0E1A2E" stroke="#334155"/>
  <text x="86" y="188" font-size="11" fill="#334155">89 50 4E 47</text><text x="86" y="208" font-size="11" fill="#334155">0D 0A 1A 0A</text><text x="86" y="228" font-size="11" fill="#334155">00 00 00 0D</text><text x="86" y="248" font-size="11" fill="#334155">49 48 44 52</text><text x="86" y="268" font-size="11" fill="#334155">...</text>

  <!-- decode -> full image -->
  <path d="M206 235 L262 235" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <text x="212" y="226" font-size="11" fill="#38BDF8">decode</text>
  <text x="330" y="150" font-size="12.5" fill="#64748B">full-size pixels</text>
  <rect x="272" y="160" width="150" height="150" rx="6" fill="url(#sky)" stroke="#1E3A5F"/>
  <circle cx="312" cy="196" r="13" fill="#38BDF8" fill-opacity="0.6"/>
  <path d="M282 300 L322 250 L350 278 L386 234 L416 272 L416 300 Z" fill="#0B1220" fill-opacity="0.5"/>
  <path d="M282 300 L322 250 L350 278 L386 234 L416 272" stroke="#38BDF8" stroke-width="1.5" fill="none"/>

  <!-- resize -> thumbnail -->
  <path d="M428 235 L484 235" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <text x="430" y="226" font-size="11" fill="#38BDF8">resize</text>
  <text x="516" y="200" font-size="12.5" fill="#64748B">thumbnail</text>
  <rect x="494" y="210" width="80" height="80" rx="5" fill="url(#sky)" stroke="#38BDF8"/>
  <circle cx="516" cy="230" r="7" fill="#38BDF8" fill-opacity="0.6"/>
  <path d="M500 285 L522 258 L537 273 L556 250 L566 270" stroke="#38BDF8" stroke-width="1.2" fill="none"/>

  <!-- encode -> bytes -->
  <path d="M580 250 L636 250" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <text x="582" y="241" font-size="11" fill="#38BDF8">encode</text>
  <rect x="646" y="210" width="120" height="80" rx="6" fill="#111C2E" stroke="#38BDF8"/>
  <text x="706" y="245" font-size="13" fill="#E2E8F0" text-anchor="middle">thumb.jpg</text>
  <text x="706" y="266" font-size="11.5" fill="#94A3B8" text-anchor="middle">one call</text>

  <text x="830" y="200" font-size="13" fill="#94A3B8">stb_image (decode)</text>
  <text x="830" y="222" font-size="13" fill="#94A3B8">stb_image_resize2 (filter)</text>
  <text x="830" y="244" font-size="13" fill="#94A3B8">stb_image_write (encode)</text>
  <text x="830" y="272" font-size="12.5" fill="#64748B">public-domain C, vendored,</text>
  <text x="830" y="292" font-size="12.5" fill="#64748B">no external dependencies.</text>
  <text x="60" y="400" font-size="12.5" fill="#64748B">Decode plus resize plus encode is measured about 5x faster than the pure-Dart image package on a 2000x2000 source.</text>
</svg>
